name: Android Build

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Rename APK
        run: |
          mkdir -p final-apk
          cp app/build/outputs/apk/debug/app-debug.apk final-apk/Walhero-Live-Wallpaper-debug.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Walhero-Live-Wallpaper-debug-APK
          path: final-apk/Walhero-Live-Wallpaper-debug.apk
